<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#F6F7F9"/>
  <rect x="70" y="54" width="1060" height="612" rx="18" fill="#FFFFFF" stroke="#D7DCE2"/>
  <rect x="70" y="54" width="1060" height="86" rx="18" fill="#0F172A"/>
  <text x="112" y="107" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">A/B Experiment Analysis Report</text>
  <text x="112" y="164" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="19">DeepAnalyze generated this report from a short human prompt and used stataskills during analysis.</text>

  <rect x="112" y="200" width="300" height="120" rx="14" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="136" y="238" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Conversion Rate</text>
  <text x="136" y="277" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">11.6% vs 9.45%</text>
  <text x="136" y="304" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="17">B group is higher, p = 0.0267</text>

  <rect x="450" y="200" width="300" height="120" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="474" y="238" fill="#065F46" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Session Time</text>
  <text x="474" y="277" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">129.02 vs 120.21</text>
  <text x="474" y="304" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="17">B group is longer, p &lt; 0.0001</text>

  <rect x="788" y="200" width="300" height="120" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="812" y="238" fill="#9A3412" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Engagement Score</text>
  <text x="812" y="277" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">177.88 vs 173.48</text>
  <text x="812" y="304" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="17">B group is higher, p = 0.0018</text>

  <text x="112" y="379" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750">DeepAnalyze answer excerpt</text>
  <rect x="112" y="405" width="976" height="160" rx="14" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="142" y="445" fill="#1F2937" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Recommendation</text>
  <text x="142" y="482" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="19">B group performs better on conversion rate and several engagement metrics.</text>
  <text x="142" y="517" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="19">Scale up gradually, keep a control group, and monitor conversion and engagement.</text>
  <text x="142" y="548" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="17">The full Markdown report, raw model trace, and validation JSON are included in stataskills_demo/artifacts/reports/.</text>

  <rect x="112" y="600" width="220" height="34" rx="17" fill="#E0F2FE"/>
  <text x="134" y="623" fill="#075985" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">stataskills: read_csv</text>
  <rect x="350" y="600" width="235" height="34" rx="17" fill="#DCFCE7"/>
  <text x="372" y="623" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">stataskills: ab_ttest</text>
  <rect x="603" y="600" width="310" height="34" rx="17" fill="#FAE8FF"/>
  <text x="625" y="623" fill="#86198F" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">validation: passed, raw trace saved</text>
</svg>
